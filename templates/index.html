<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Character Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Deep dark blue/black */
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(173, 139, 233, 0.2);
            border-radius: 1.5rem;
        }
        .drop-zone {
            border: 2px dashed rgba(173, 139, 233, 0.4);
            transition: all 0.3s ease;
        }
        .drop-zone.dragover {
            border-color: #AD8BE9;
            background: rgba(173, 139, 233, 0.1);
            transform: scale(1.02);
        }
        .purple-glow {
            box-shadow: 0 0 20px rgba(173, 139, 233, 0.15);
        }
        #loading-spinner { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass-card p-10 w-full max-w-lg text-center purple-glow">
        <h1 class="text-3xl font-bold mb-2 text-white">Character Predictor</h1>
        <p class="text-slate-400 mb-8">Drop an image of an anime character to identify them.</p>

        <div id="drop-zone" class="drop-zone p-12 rounded-xl cursor-pointer flex flex-col items-center justify-center">
            <svg class="w-12 h-12 text-[#AD8BE9] mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <p class="text-sm text-slate-300">Drag & Drop or <span class="text-[#AD8BE9] font-semibold">Browse</span></p>
            <input type="file" id="file-input" class="hidden" accept="image/*">
        </div>

        <div id="result-container" class="mt-8 hidden">
            <div id="loading-spinner" class="flex flex-col items-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#AD8BE9]"></div>
                <p class="mt-4 text-sm text-slate-400">Analyzing face features...</p>
            </div>

            <div id="prediction-result" class="hidden">
                <p class="text-slate-400 text-sm uppercase tracking-widest">Prediction</p>
                <h2 id="character-name" class="text-4xl font-black text-[#AD8BE9] mt-2">---</h2>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultContainer = document.getElementById('result-container');
        const loadingSpinner = document.getElementById('loading-spinner');
        const predictionResult = document.getElementById('prediction-result');
        const characterName = document.getElementById('character-name');

        // Handle Clicks
        dropZone.onclick = () => fileInput.click();

        // Drag & Drop Events
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleUpload(e.dataTransfer.files[0]);
        };

        fileInput.onchange = (e) => handleUpload(e.target.files[0]);

        function handleUpload(file) {
            if (!file) return;

            // Show UI Loading
            resultContainer.classList.remove('hidden');
            loadingSpinner.style.display = 'flex';
            predictionResult.classList.add('hidden');

            const formData = new FormData();
            formData.append('image', file);

            // POST to Django Backend
            fetch('/classify/', {
                method: 'POST',
                body: formData,
                headers: { 'X-CSRFToken': '{{ csrf_token }}' }
            })
            .then(response => response.json())
            .then(data => {
                loadingSpinner.style.display = 'none';
                predictionResult.classList.remove('hidden');
                characterName.innerText = data.name;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Something went wrong!');
            });
        }
    </script>
</body>
</html>
